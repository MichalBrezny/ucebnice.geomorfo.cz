# Geomorfologický kvíz - datový soubor
# Teoretické otázky (procesy, klasifikace, souvislosti).
# Struktura otázky:
#   id: unikátní identifikátor (string)
#   kategorie: kategorie otázky (odpovídá kapitolám učebnice)
#   obtiznost: 1 (lehká) | 2 (střední) | 3 (těžká) - pro interní statistiky
#   typ: "foto" | "hillshade" | "schema" | "text"
#   otazka: text otázky
#   obrazek: cesta k obrázku (relativní od /assets/kviz/img/) - nepovinné
#   obrazek_popis: popisek/credit k obrázku - nepovinné
#   moznosti:
#     - text: text možnosti
#       spravne: true/false
#   vysvetleni: text vysvětlení po zodpovězení

otazky:

  # === SVAHOVÉ PROCESY ===
  - id: svahy_003
    kategorie: Svahové procesy
    obtiznost: 2
    typ: text
    otazka: "Který z následujících procesů NENÍ řazen mezi rychlé svahové pohyby (dle Varnesovy klasifikace)?"
    moznosti:
      - text: Soliflukce
        spravne: true
      - text: Kamenitá lavina (rock avalanche)
        spravne: false
      - text: Bahnotok (debris flow)
        spravne: false
      - text: Řícení (fall)
        spravne: false
    vysvetleni: "Soliflukce je pomalý svahový proces (mm–cm/rok) typický pro periglaciální prostředí, kde saturovaná půda pomalu tečuje přes permafrost nebo zmrzlý podklad. Kamenitá lavina, bahnotok a řícení patří mezi rychlé až velmi rychlé pohyby."

  - id: svahy_004
    kategorie: Svahové procesy
    obtiznost: 3
    typ: hillshade
    otazka: "Odhadněte relativní stáří sesuvů A a B na hillshadu. Který je starší a proč?"
    obrazek: svahy_reliktni_sesuv.jpg
    obrazek_popis: "Hillshade LiDAR, Vsetínské vrchy. Zdroj: ČÚZK"
    moznosti:
      - text: "A je starší – má zaoblenější morfologii a méně výraznou odlučnou stěnu"
        spravne: true
      - text: "B je starší – je větší a zasahuje hlouběji do svahu"
        spravne: false
      - text: "Nelze určit z hillshadu"
        spravne: false
      - text: "A je mladší – jeho těleso překrývá sesuv B"
        spravne: false
    vysvetleni: "Relativní datování sesuvů z hillshadu vychází z míry morfologické degradace: starší sesuvy mají zaoblenější hrany odlučné stěny, méně výraznou morfologii tělesa a bývají překryty nebo narušeny mladšími procesy. Svěžejší morfologie indikuje mladší událost."

  # === FLUVIÁLNÍ GEOMORFOLOGIE ===
  - id: fluvial_003
    kategorie: Fluviální geomorfologie
    obtiznost: 3
    typ: schema
    otazka: "Jaký proces vysvětluje vznik oxbow jezera (mrtvého ramene)?"
    obrazek: fluvial_oxbow_schema.jpg
    obrazek_popis: "Schéma vývoje meandrového jezera"
    moznosti:
      - text: "Přepojení meandru (meander cutoff) při povodni, zkrácení toku"
        spravne: true
      - text: "Tektonické poklesy v nivě"
        spravne: false
      - text: "Zpětná eroze z přítoku"
        spravne: false
      - text: "Glaciální exarace v nivě"
        spravne: false
    vysvetleni: "Mrtvé rameno (oxbow lake) vzniká přepojením meandru – nejčastěji při povodni tok zkrátí cestu přes meandrový krček (neck cutoff). Oddělené rameno postupně zaniká sedimentací. Je to přirozená součást dynamiky meandrujících toků."
